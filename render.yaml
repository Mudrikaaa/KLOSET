# Render Blueprint — deploys the Kloset backend + a managed PostgreSQL.
# In the Render dashboard: New → Blueprint → point at this repo. Render reads
# this file and provisions both resources. Secrets marked sync:false are
# entered once in the dashboard (never committed).
services:
  - type: web
    name: kloset-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: kloset-db
          property: connectionString
      # Secrets — paste these in the Render dashboard (values live only there
      # and in your local backend/.env, mirroring the repo's secrets rule):
      - key: JWT_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false

databases:
  - name: kloset-db
    plan: free
